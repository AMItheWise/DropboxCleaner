name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-3 \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI
        working-directory: web
        run: |
          npm ci
          npm test
          npm run build

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Compile sources
        run: python -m compileall app tests

      - name: Build package
        run: python -m build

  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Build Windows app
        shell: pwsh
        run: python -m PyInstaller packaging/DropboxCleaner-windows.spec --noconfirm --clean

      - name: Verify Windows app
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\DropboxCleaner\DropboxCleaner.exe")) {
            throw "DropboxCleaner.exe was not created"
          }

      - name: Zip Windows artifact
        shell: pwsh
        run: Compress-Archive -Path "dist\DropboxCleaner" -DestinationPath "DropboxCleaner-Windows.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DropboxCleaner-Windows
          path: DropboxCleaner-Windows.zip
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Build macOS app
        run: python -m PyInstaller packaging/DropboxCleaner-macos.spec --noconfirm --clean

      - name: Verify macOS app
        run: test -d "dist/Dropbox Cleaner.app"

      - name: Zip macOS artifact
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Dropbox Cleaner.app" DropboxCleaner-macOS.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: DropboxCleaner-macOS
          path: DropboxCleaner-macOS.zip
          retention-days: 14
