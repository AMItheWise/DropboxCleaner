auth:
  account_mode: "personal"  # personal or team_admin
  app_key: "YOUR_DROPBOX_APP_KEY"
  # Prefer saved credentials from the GUI or `py -3.11 -m app.cli.main oauth-link`.
  # For non-interactive setups, uncomment one of these:
  # refresh_token: "YOUR_DROPBOX_REFRESH_TOKEN"
  # access_token: "YOUR_SHORT_LIVED_ACCESS_TOKEN"
  # Optional in team_admin mode if you need to force a specific admin context:
  # admin_member_id: "dbmid:YOUR_ADMIN_MEMBER_ID"
  scopes:
    - account_info.read
    - files.metadata.read
    - files.content.read
    - files.content.write

job:
  source_roots:
    - /
  excluded_roots: []
  # Add Dropbox folders to skip during inventory and copy planning, for example:
  # excluded_roots:
  #   - /Screenshots
  cutoff_date: "2020-05-01"
  # Options: server_modified, client_modified, oldest_modified.
  # Use client_modified/oldest_modified when Dropbox shows old file dates but API server_modified is recent.
  date_filter_field: "server_modified"
  archive_root: "/Archive_PreMay2020"
  output_dir: "./outputs"
  batch_size: 500
  retry_count: 5
  initial_backoff: 1.0
  backoff_multiplier: 2.0
  max_backoff: 30.0
  conflict_policy: "safe_skip"
  worker_count: 1
  include_folders_in_inventory: true
  exclude_archive_destination: true
  team_coverage_preset: "all_team_content"
